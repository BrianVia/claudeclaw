# Slack App Manifest for ClaudeClaw
#
# How to use:
#   1. Go to https://api.slack.com/apps?new_app=1
#   2. Select "From a manifest"
#   3. Pick your workspace
#   4. Paste this YAML (or switch to YAML tab first)
#   5. Review and create
#   6. After creation:
#      - Go to "Basic Information" → scroll to "App-Level Tokens"
#        → Generate Token with `connections:write` scope
#        → Copy it as your `appToken` (starts with xapp-)
#      - Go to "OAuth & Permissions" → "Install to Workspace"
#        → Copy "Bot User OAuth Token" as your `botToken` (starts with xoxb-)
#   7. Add both tokens to .claude/claudeclaw/settings.json:
#        {
#          "slack": {
#            "botToken": "xoxb-...",
#            "appToken": "xapp-..."
#          }
#        }

display_information:
  name: ClaudeClaw
  description: AI assistant powered by Claude Code
  background_color: "#1a1a2e"
  long_description: |
    ClaudeClaw is a personal AI assistant daemon that runs Claude Code
    as a background service. It responds to messages, runs scheduled
    tasks, and executes cron jobs — all through your Slack workspace.

features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: ClaudeClaw
    always_online: true
  slash_commands:
    - command: /claw
      description: Send a prompt to ClaudeClaw
      usage_hint: "[your message]"
      should_escape: false
    - command: /claw-status
      description: Show ClaudeClaw session status
      should_escape: false
    - command: /claw-reset
      description: Reset the ClaudeClaw session
      should_escape: false
    - command: /claw-compact
      description: Compact the session to reduce context size
      should_escape: false

oauth_config:
  scopes:
    bot:
      # Reading messages
      - app_mentions:read     # Receive @ClaudeClaw mentions
      - channels:history      # Read messages in public channels
      - channels:read         # Get public channel info
      - groups:history        # Read messages in private channels
      - groups:read           # Get private channel info
      - im:history            # Read direct messages
      - im:read               # Get DM channel info
      - im:write              # Open DM conversations
      - mpim:history          # Read group DMs
      - mpim:read             # Get group DM info
      # Sending messages
      - chat:write            # Send messages and replies
      # Reactions
      - reactions:read        # Read reactions on messages
      - reactions:write       # Add/remove reactions (processing indicators)
      # Files
      - files:read            # Download shared images and audio
      # Users
      - users:read            # Resolve user display names

settings:
  event_subscriptions:
    bot_events:
      - app_mention           # When someone @mentions the bot
      - message.channels      # Messages in public channels the bot is in
      - message.groups        # Messages in private channels the bot is in
      - message.im            # Direct messages to the bot
      - message.mpim          # Group direct messages
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
